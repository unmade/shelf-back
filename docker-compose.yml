services:
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web interface port

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z@sha256:f6efb212cad3b62f78ca02339f16d8bc28d5bb2fbe792dfc21225c6037d2af8b
    environment:
      - MINIO_ROOT_USER=AKIAIOSFODNN7EXAMPLE
      - MINIO_ROOT_PASSWORD=wJalrXUtnFEMIK7MDENGbPxRfiCYEXAMPLEKEY
    volumes:
      - shelf-minio-volume:/data
    ports:
      - "9000:9000"
      - "9090:9090"
    command: server /data --console-address ":9090"

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=shelf
      - POSTGRES_PASSWORD=shelf
      - POSTGRES_DB=shelf
    volumes:
      - shelf-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"


volumes:
  shelf-db-volume: {}
  shelf-minio-volume: {}

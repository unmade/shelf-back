version: 2

updates:
- package-ecosystem: "uv"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    dev-minor:
      applies-to: version-updates
      patterns:
        - "aiosmtpd"
        - "anyio"
        - "faker"
        - "ipython"
        - "mypy"
        - "pre-commit"
        - "pytest*"
      update-types:
        - "minor"
        - "patch"
    patch:
      applies-to: version-updates
      patterns:
        - "*"
      update-types:
        - "patch"
    security:
      applies-to: security-updates
      patterns:
        - "*"
      update-types:
        - "patch"
        - "minor"

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    docker-all:
      patterns:
        - "*"

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    actions-all:
      patterns:
        - "*"
